---
name: Node.js CI

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
  push:
    branches: [main]
    paths:
      - '**/*.md'

jobs:
  lint:
    name: Lint Markdown Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm ci

      - name: Run markdownlint
        run: npx markdownlint "**/*.md"

      - name: Textlint
        run: npx textlint "**/*.md"
